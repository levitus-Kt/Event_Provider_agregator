version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: events_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - events_network

  app:
    build: .
    container_name: events_api
    env_file:
      - .env
    environment:
      - DATABASE_URL=${POSTGRES_CONNECTION_STRING}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    networks:
      - events_network

volumes:
  postgres_data:

networks:
  events_network:
    driver: bridge